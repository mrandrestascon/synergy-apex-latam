<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynergY Apex - Dashboard LATAM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; border-radius: 10px; margin-bottom: 30px; text-align: center; }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .country-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; background: #1e293b; border: 2px solid #475569; color: #e2e8f0; cursor: pointer; border-radius: 5px; transition: all 0.3s; font-size: 14px; font-weight: 500; }
        .tab-btn.active { background: #667eea; border-color: #667eea; }
        .tab-btn:hover { border-color: #667eea; }
        .content { display: none; }
        .content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: #1e293b; padding: 20px; border-radius: 8px; border-left: 4px solid #667eea; }
        .kpi-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; }
        .kpi-value { font-size: 28px; font-weight: bold; color: #f1f5f9; }
        .kpi-change { font-size: 12px; color: #10b981; margin-top: 8px; }
        .chart-container { background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 30px; position: relative; height: 400px; }
        .table-container { background: #1e293b; padding: 20px; border-radius: 8px; overflow-x: auto; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0f172a; padding: 12px; text-align: left; font-weight: 600; color: #94a3b8; border-bottom: 1px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        tr:hover { background: #0f172a; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
        .error { background: #7f1d1d; color: #fecaca; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌎 SynergY Apex - Dashboard de Expansión LATAM</h1>
            <p>Inteligencia de datos bancarios en tiempo real</p>
        </header>

        <div class="country-tabs">
            <button class="tab-btn active" onclick="showCountry('Mexico')">🇲🇽 México</button>
            <button class="tab-btn" onclick="showCountry('Chile')">🇨🇱 Chile</button>
            <button class="tab-btn" onclick="showCountry('Panamá')">🇵🇦 Panamá</button>
            <button class="tab-btn" onclick="showCountry('Costa Rica')">🇨🇷 Costa Rica</button>
        </div>

        <div id="Mexico" class="content active">
            <div id="mexico-loading" class="loading">Cargando datos de México...</div>
            <div id="mexico-content" style="display: none;"></div>
        </div>
        <div id="Chile" class="content">
            <div id="chile-loading" class="loading">Cargando datos de Chile...</div>
            <div id="chile-content" style="display: none;"></div>
        </div>
        <div id="Panamá" class="content">
            <div id="panama-loading" class="loading">Cargando datos de Panamá...</div>
            <div id="panama-content" style="display: none;"></div>
        </div>
        <div id="Costa Rica" class="content">
            <div id="costarica-loading" class="loading">Cargando datos de Costa Rica...</div>
            <div id="costarica-content" style="display: none;"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        const countries = ['Mexico', 'Chile', 'Panamá', 'Costa Rica'];
        const countryMap = { 'Mexico': 'mexico', 'Chile': 'chile', 'Panamá': 'panama', 'Costa Rica': 'costarica' };

        function showCountry(country) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(country).classList.add('active');
            event.target.classList.add('active');
            loadCountryData(country);
        }

        async function loadCountryData(country) {
            const apiKey = countryMap[country];
            const endpoint = `${API_BASE}/${apiKey}`;
            const loadingId = `${apiKey}-loading`;
            const contentId = `${apiKey}-content`;

            try {
                const response = await fetch(endpoint);
                if (!response.ok) throw new Error('Error al cargar datos');
                const data = response.json();
                renderCountryDashboard(country, data, contentId);
                document.getElementById(loadingId).style.display = 'none';
                document.getElementById(contentId).style.display = 'block';
            } catch (error) {
                document.getElementById(loadingId).innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        function renderCountryDashboard(country, data, contentId) {
            const countryData = data.country_data || {};
            const actors = data.actors || [];

            let html = `
                <div class="grid">
                    <div class="kpi-card">
                        <div class="kpi-label">PIB (Billones USD)</div>
                        <div class="kpi-value">$${countryData.pib || 'N/A'}</div>
                        <div class="kpi-change">Crecimiento: ${countryData.pib_crecimiento || 'N/A'}%</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Población</div>
                        <div class="kpi-value">${(countryData.poblacion / 1000000).toFixed(1) || 'N/A'}</div>
                        <div class="kpi-change">Millones de habitantes</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Bancarización</div>
                        <div class="kpi-value">${countryData.bancarizacion || 'N/A'}%</div>
                        <div class="kpi-change">% de la población</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Inflación</div>
                        <div class="kpi-value">${countryData.inflacion || 'N/A'}%</div>
                        <div class="kpi-change">Tasa BC: ${countryData.tasa_bc || 'N/A'}%</div>
                    </div>
                </div>

                <div class="table-container">
                    <h2 style="margin-bottom: 15px;">Top 10 Actores Bancarios</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Banco</th>
                                <th>Depósitos Vista</th>
                                <th>Depósitos Plazo</th>
                                <th>ACM (USD)</th>
                                <th>Cuota Mercado</th>
                                <th>CAGR</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            actors.slice(0, 10).forEach(actor => {
                html += `
                    <tr>
                        <td><strong>${actor.nombre_actor}</strong></td>
                        <td>$${actor.depositos_vista || 0}M</td>
                        <td>$${actor.depositos_plazo || 0}M</td>
                        <td>$${actor.acm || 0}M</td>
                        <td>${actor.cuota_mercado || 0}%</td>
                        <td><strong>${actor.cagr || 0}%</strong></td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
            document.getElementById(contentId).innerHTML = html;
        }

        // Cargar México al iniciar
        loadCountryData('Mexico');
    </script>
</body>
</html>
