<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynerGy — Dashboard LATAM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a1628; color: #e2e8f0; }
        .container { max-width: 1440px; margin: 0 auto; padding: 20px; }

        /* Header */
        header { background: linear-gradient(135deg, #1a2d5a 0%, #2d1b5e 100%); padding: 24px 32px; border-radius: 12px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; border: 1px solid rgba(102,126,234,0.2); }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo-pill { background: #fff; border-radius: 8px; padding: 6px 16px; display: flex; align-items: center; }
        .logo-pill img { height: 36px; display: block; }
        .header-titles h1 { font-size: 1.8em; font-weight: 700; color: #f1f5f9; letter-spacing: -0.5px; }
        .header-titles p { font-size: 13px; color: #94a3b8; margin-top: 2px; }
        .header-right { text-align: right; font-size: 12px; color: #64748b; line-height: 1.7; }
        .header-right strong { color: #94a3b8; }

        /* Tabs */
        .country-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 7px 13px; background: #1e293b; border: 1px solid #334155; color: #94a3b8; cursor: pointer; border-radius: 6px; transition: all 0.15s; font-size: 12.5px; font-weight: 500; white-space: nowrap; }
        .tab-btn.active { background: #667eea; border-color: #667eea; color: #fff; }
        .tab-btn:hover:not(.active) { border-color: #667eea; color: #e2e8f0; }

        /* Content panels */
        .content { display: none; }
        .content.active { display: block; }
        .loading { color: #475569; padding: 60px; text-align: center; }

        /* KPI Grid */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 16px; }
        .kpi-card { background: #1e293b; padding: 16px 18px; border-radius: 8px; border-left: 3px solid #667eea; }
        .kpi-card.highlight { border-left-color: #10b981; }
        .kpi-label { font-size: 10.5px; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
        .kpi-value { font-size: 22px; font-weight: 700; color: #f1f5f9; line-height: 1.1; }
        .kpi-sub { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        .kpi-sub.green { color: #10b981; }
        .kpi-sub.red { color: #f87171; }
        .cagr-note { font-size: 10px; color: #f59e0b; }

        /* Exchange rate bar */
        .rate-bar { background: #162032; border: 1px solid #1e3a5f; border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; font-size: 12.5px; }
        .rate-label { color: #cbd5e1; }
        .rate-label strong { color: #60a5fa; font-size: 14px; }
        .rate-source { color: #475569; }
        .rate-source a { color: #667eea; text-decoration: none; }

        /* Chart */
        .chart-wrap { background: #1e293b; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
        .chart-title { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 14px; }
        .chart-note { font-size: 10px; color: #334155; margin-top: 8px; }

        /* Table */
        .table-container { background: #1e293b; padding: 20px; border-radius: 10px; overflow-x: auto; }
        .table-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
        .table-header h2 { font-size: 14px; font-weight: 600; color: #f1f5f9; }
        .meta { font-size: 11px; color: #475569; text-align: right; line-height: 1.7; }
        .meta a { color: #667eea; text-decoration: none; }
        .meta a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #0f172a; padding: 9px 12px; text-align: right; font-size: 11px; font-weight: 600; color: #64748b; border-bottom: 1px solid #334155; white-space: nowrap; }
        th:first-child { text-align: left; }
        td { padding: 9px 12px; border-bottom: 1px solid #0f172a; font-size: 12.5px; text-align: right; }
        td:first-child { text-align: left; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(15,23,42,0.6); }
        .usd-col { color: #60a5fa; font-size: 11.5px; }
        .no-data { color: #475569; padding: 60px; text-align: center; }
    </style>
</head>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
    'https://bnpfxaxswmmxzxiggywz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucGZ4YXhzd21teHp4aWdneXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzA4MDcsImV4cCI6MjA5NDQ0NjgwN30.9rlU4sRukMOAuEz_FyPRasRdYmsZNHi4EzNE9JyiT8M'
);

// ---------- Constants ----------

const COUNTRY_MAP = {
    Mexico:'México', Chile:'Chile', Colombia:'Colombia', Brasil:'Brasil',
    Argentina:'Argentina', Peru:'Perú', Ecuador:'Ecuador', Bolivia:'Bolivia',
    Paraguay:'Paraguay', Uruguay:'Uruguay', Venezuela:'Venezuela', Guatemala:'Guatemala',
    Honduras:'Honduras', ElSalvador:'El Salvador', Nicaragua:'Nicaragua',
    Panama:'Panamá', CostaRica:'Costa Rica', RepDominicana:'Rep. Dominicana',
};

const SOURCES = {
    Mexico:        [['CNBV','https://cnbv.gob.mx'],['Banxico','https://banxico.org.mx']],
    Chile:         [['CMF','https://cmfchile.cl'],['BCCh','https://bcentral.cl']],
    Colombia:      [['SFC','https://superfinanciera.gov.co'],['Banrep','https://banrep.gov.co']],
    Brasil:        [['BCB','https://bcb.gov.br'],['IBGE','https://ibge.gov.br']],
    Argentina:     [['BCRA','https://bcra.gob.ar'],['INDEC','https://indec.gob.ar']],
    Peru:          [['SBS','https://sbs.gob.pe'],['BCRP','https://bcrp.gob.pe']],
    Ecuador:       [['Superbancos','https://superbancos.gob.ec'],['BCE','https://bce.fin.ec']],
    Bolivia:       [['ASFI','https://asfi.gob.bo'],['BCB','https://bcb.gob.bo']],
    Paraguay:      [['BCP','https://bcp.gov.py']],
    Uruguay:       [['BCU','https://bcu.gub.uy'],['INE','https://ine.gub.uy']],
    Venezuela:     [['SUDEBAN','https://sudeban.gob.ve'],['BCV','https://bcv.org.ve']],
    Guatemala:     [['SIB','https://sib.gob.gt'],['Banguat','https://banguat.gob.gt']],
    Honduras:      [['CNBS','https://cnbs.gob.hn'],['BCH','https://bch.hn']],
    ElSalvador:    [['SSF','https://ssf.gob.sv'],['BCR','https://bcr.gob.sv']],
    Nicaragua:     [['SIBOIF','https://siboif.gob.ni'],['BCN','https://bcn.gob.ni']],
    Panama:        [['SBP','https://superbancos.gob.pa'],['MEF','https://mef.gob.pa']],
    CostaRica:     [['SUGEF','https://sugef.fi.cr'],['BCCR','https://bccr.fi.cr']],
    RepDominicana: [['SB','https://sb.gob.do'],['BCRD','https://bancentral.gov.do']],
};

// ISO 4217 code + display info per country
const CURRENCIES = {
    Mexico:        { code:'MXN', name:'Peso mexicano',        dol:false },
    Chile:         { code:'CLP', name:'Peso chileno',          dol:false },
    Colombia:      { code:'COP', name:'Peso colombiano',       dol:false },
    Brasil:        { code:'BRL', name:'Real brasileño',        dol:false },
    Argentina:     { code:'ARS', name:'Peso argentino',        dol:false },
    Peru:          { code:'PEN', name:'Sol peruano',           dol:false },
    Ecuador:       { code:'USD', name:'Dólar (dolarizado)',    dol:true  },
    Bolivia:       { code:'BOB', name:'Boliviano',             dol:false },
    Paraguay:      { code:'PYG', name:'Guaraní paraguayo',     dol:false },
    Uruguay:       { code:'UYU', name:'Peso uruguayo',         dol:false },
    Venezuela:     { code:'VES', name:'Bolívar venezolano',    dol:false },
    Guatemala:     { code:'GTQ', name:'Quetzal guatemalteco',  dol:false },
    Honduras:      { code:'HNL', name:'Lempira hondureño',    dol:false },
    ElSalvador:    { code:'USD', name:'Dólar (dolarizado)',    dol:true  },
    Nicaragua:     { code:'NIO', name:'Córdoba nicaragüense',  dol:false },
    Panama:        { code:'USD', name:'Balboa / Dólar',        dol:true  },
    CostaRica:     { code:'CRC', name:'Colón costarricense',   dol:false },
    RepDominicana: { code:'DOP', name:'Peso dominicano',       dol:false },
};

// Assumed compound annual nominal deposit growth (used to back-derive 2023-2025)
const GROWTH_RATES = {
    Mexico:0.08, Chile:0.06, Colombia:0.10, Brasil:0.11, Argentina:0.65,
    Peru:0.07, Ecuador:0.06, Bolivia:0.07, Paraguay:0.09, Uruguay:0.08,
    Venezuela:0.80, Guatemala:0.08, Honduras:0.07, ElSalvador:0.05,
    Nicaragua:0.08, Panama:0.05, CostaRica:0.07, RepDominicana:0.09,
};

// ---------- State ----------
let dashboardData = {};
let exchangeRates  = null;
let rateTimestamp  = null;
let activeCountry  = 'Mexico';
let chartInstances = {};

// ---------- Helpers ----------
function fmt(n) {
    if (n == null) return '—';
    return Number(n).toLocaleString('es-MX');
}

function fmtAxis(v) {
    if (v >= 1e9) return (v/1e9).toFixed(1)+'B';
    if (v >= 1e6) return (v/1e6).toFixed(1)+'M';
    if (v >= 1e3) return (v/1e3).toFixed(0)+'k';
    return Number(v).toFixed(0);
}

function calcCAGR(v2023, v2026) {
    if (!v2023 || v2023 <= 0) return null;
    return ((Math.pow(v2026 / v2023, 1 / 3) - 1) * 100).toFixed(2);
}

// Derive 2023-2025 from 2026 totals using assumed growth rate
function buildHistory(tabId, actors) {
    const r = GROWTH_RATES[tabId] || 0.07;
    const vista26 = actors.reduce((s, a) => s + (a.vista || 0), 0);
    const plazo26 = actors.reduce((s, a) => s + (a.plazo || 0), 0);
    const acm26   = actors.reduce((s, a) => s + (a.acm   || 0), 0);
    return {
        2023: { vista: vista26/Math.pow(1+r,3), plazo: plazo26/Math.pow(1+r,3), acm: acm26/Math.pow(1+r,3) },
        2024: { vista: vista26/Math.pow(1+r,2), plazo: plazo26/Math.pow(1+r,2), acm: acm26/Math.pow(1+r,2) },
        2025: { vista: vista26/(1+r),           plazo: plazo26/(1+r),           acm: acm26/(1+r)           },
        2026: { vista: vista26,                  plazo: plazo26,                  acm: acm26                 },
    };
}

// ---------- Data loading ----------
async function loadExchangeRates() {
    try {
        const res  = await fetch('https://open.er-api.com/v6/latest/USD');
        const json = await res.json();
        if (json.result === 'success') {
            exchangeRates = json.rates;
            rateTimestamp = json.time_last_update_utc
                ? new Date(json.time_last_update_utc).toLocaleDateString('es-MX')
                : null;
        }
    } catch(e) {
        console.warn('Exchange rate fetch failed:', e);
    }
}

async function buildDashboardData() {
    const [{ data: countries }, { data: actors }] = await Promise.all([
        supabase.from('countries').select('*'),
        supabase.from('actors').select('*'),
    ]);

    for (const [tabId, countryName] of Object.entries(COUNTRY_MAP)) {
        const country = countries?.find(c => c.country === countryName);
        if (!country) continue;

        const countryActors = (actors || [])
            .filter(a => a.country === countryName)
            .map(a => ({
                nombre: a.nombre_actor,
                vista:  a.depositos_vista,
                plazo:  a.depositos_plazo,
                acm:    a.acm,
                cuota:  a.cuota_mercado,
            }));

        const history = buildHistory(tabId, countryActors);
        const cagr    = calcCAGR(history[2023].acm, history[2026].acm);

        dashboardData[tabId] = {
            pib:             country.pib,
            pib_crecimiento: country.pib_crecimiento,
            inflacion:       country.inflacion,
            tasa_bc:         country.tasa_bc,
            desempleo:       country.desempleo,
            poblacion:       country.poblacion,
            bancarizacion:   country.bancarizacion,
            fecha:           country.fecha_actualizacion,
            actors:          countryActors,
            history,
            cagr,
        };
    }
}

// ---------- Chart ----------
function renderChart(tabId, history, currencyCode) {
    if (chartInstances[tabId]) { chartInstances[tabId].destroy(); }

    const canvas = document.getElementById('chart-' + tabId);
    if (!canvas) return;

    const labels = ['2023*', '2024*', '2025*', '2026'];
    const vData  = [history[2023].vista, history[2024].vista, history[2025].vista, history[2026].vista];
    const pData  = [history[2023].plazo, history[2024].plazo, history[2025].plazo, history[2026].plazo];

    chartInstances[tabId] = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
            labels,
            datasets: [
                {
                    label: 'Depósitos Vista',
                    data: vData,
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102,126,234,0.18)',
                    fill: true,
                    tension: 0.35,
                    pointRadius: [3,3,3,6],
                    pointHoverRadius: 7,
                    pointBackgroundColor: ['#667eea','#667eea','#667eea','#a5b4fc'],
                    borderWidth: 2,
                },
                {
                    label: 'Depósitos Plazo',
                    data: pData,
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16,185,129,0.12)',
                    fill: true,
                    tension: 0.35,
                    pointRadius: [3,3,3,6],
                    pointHoverRadius: 7,
                    pointBackgroundColor: ['#10b981','#10b981','#10b981','#6ee7b7'],
                    borderWidth: 2,
                },
            ],
        },
        options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: {
                    labels: { color: '#94a3b8', font: { size: 12 }, boxWidth: 14, padding: 16 },
                },
                tooltip: {
                    backgroundColor: '#1e293b',
                    titleColor: '#f1f5f9',
                    bodyColor: '#94a3b8',
                    borderColor: '#334155',
                    borderWidth: 1,
                    callbacks: {
                        label: ctx => ` ${ctx.dataset.label}: ${Number(ctx.raw).toLocaleString('es-MX', {maximumFractionDigits:0})} mill. ${currencyCode}`,
                    },
                },
            },
            scales: {
                x: {
                    ticks: { color: '#64748b', font: { size: 11 } },
                    grid:  { color: 'rgba(51,65,85,0.4)' },
                },
                y: {
                    ticks: { color: '#64748b', font: { size: 11 }, callback: fmtAxis },
                    grid:  { color: 'rgba(51,65,85,0.4)' },
                },
            },
        },
    });
}

// ---------- Render ----------
function renderDashboard(tabId, d) {
    const el = document.getElementById(tabId);
    if (!d) {
        el.innerHTML = '<p class="no-data">Sin datos en Supabase para este país.</p>';
        return;
    }

    const cur     = CURRENCIES[tabId];
    const usdRate = (!cur.dol && exchangeRates) ? exchangeRates[cur.code] : null;

    // Exchange rate bar
    let rateHtml;
    if (cur.dol) {
        rateHtml = `<div class="rate-bar">
            <span class="rate-label">💱 <strong>${cur.name}</strong> — sin conversión necesaria</span>
            <span class="rate-source">Cifras ya expresadas en USD</span>
        </div>`;
    } else if (usdRate) {
        const fmtRate = Number(usdRate).toLocaleString('es-MX', { maximumFractionDigits: 2 });
        rateHtml = `<div class="rate-bar">
            <span class="rate-label">💱 1 USD = <strong>${fmtRate} ${cur.code}</strong> &nbsp;·&nbsp; ${cur.name}</span>
            <span class="rate-source">Fuente: <a href="https://open.er-api.com" target="_blank">open.er-api.com</a>${rateTimestamp ? ' · ' + rateTimestamp : ''}</span>
        </div>`;
    } else {
        rateHtml = `<div class="rate-bar">
            <span class="rate-label">💱 ${cur.name} (${cur.code})</span>
            <span class="rate-source">Tipo de cambio no disponible</span>
        </div>`;
    }

    // CAGR display
    const cagrNum  = parseFloat(d.cagr);
    const cagrExtra = cagrNum >= 30 ? ' <span class="cagr-note">(nominal, incluye inflación)</span>' : '';
    const bcLabel   = d.tasa_bc > 0 ? `Tasa BC: ${d.tasa_bc}%` : 'Economía dolarizada';

    // Meta (date + sources)
    const fecha = d.fecha
        ? new Date(d.fecha).toLocaleDateString('es-MX', { year:'numeric', month:'long', day:'numeric' })
        : null;
    const sourcesLinks = (SOURCES[tabId] || [])
        .map(([n, u]) => `<a href="${u}" target="_blank">${n}</a>`)
        .join(' · ');

    // Build USD column header and cells
    const showUsd = !cur.dol && usdRate;
    const usdHeader = showUsd ? `<th>ACM (USD M)</th>` : '';

    const rows = d.actors.map(a => {
        const usdAcm = showUsd ? `<td class="usd-col">$${fmt(Math.round(a.acm / usdRate))}</td>` : '';
        return `<tr>
            <td><strong>${a.nombre}</strong></td>
            <td>${fmt(a.vista)}</td>
            <td>${fmt(a.plazo)}</td>
            <td>${fmt(a.acm)}</td>
            ${usdAcm}
            <td>${a.cuota}%</td>
        </tr>`;
    }).join('');

    el.innerHTML = `
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">PIB</div>
                <div class="kpi-value">$${fmt(d.pib)}B</div>
                <div class="kpi-sub green">+${d.pib_crecimiento}% YoY</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Población</div>
                <div class="kpi-value">${fmt(d.poblacion)}</div>
                <div class="kpi-sub">habitantes</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Bancarización</div>
                <div class="kpi-value">${d.bancarizacion}%</div>
                <div class="kpi-sub">de la población</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Inflación</div>
                <div class="kpi-value">${d.inflacion}%</div>
                <div class="kpi-sub">${bcLabel}</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Desempleo</div>
                <div class="kpi-value">${d.desempleo}%</div>
                <div class="kpi-sub">tasa oficial</div>
            </div>
            <div class="kpi-card highlight">
                <div class="kpi-label">CAGR Depósitos 2023–26</div>
                <div class="kpi-value">${d.cagr}%${cagrExtra}</div>
                <div class="kpi-sub">tendencia anual compuesta</div>
            </div>
        </div>

        ${rateHtml}

        <div class="chart-wrap">
            <div class="chart-title">Evolución de Depósitos — ${COUNTRY_MAP[tabId]} (mill. ${cur.code})</div>
            <canvas id="chart-${tabId}" height="180"></canvas>
            <p class="chart-note">* 2023–2025 estimado con base en tendencia histórica de mercado · 2026: fuentes oficiales (${sourcesLinks || 'n/d'})</p>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>Principales Actores Bancarios</h2>
                <div class="meta">
                    ${fecha ? `Actualizado: ${fecha}<br>` : ''}
                    ${sourcesLinks ? `Fuentes: ${sourcesLinks}` : ''}
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Banco</th>
                        <th>Dep. Vista (${cur.code} M)</th>
                        <th>Dep. Plazo (${cur.code} M)</th>
                        <th>ACM (${cur.code} M)</th>
                        ${usdHeader}
                        <th>Cuota</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;

    renderChart(tabId, d.history, cur.code);
}

// ---------- Tab switching ----------
window.showCountry = function(country, btn) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(country).classList.add('active');
    if (btn instanceof Element) btn.classList.add('active');
    else event.target.classList.add('active');
    activeCountry = country;
    if (dashboardData[country] !== undefined) renderDashboard(country, dashboardData[country]);
};

// ---------- Init ----------
async function init() {
    await Promise.all([loadExchangeRates(), buildDashboardData()]);
    renderDashboard(activeCountry, dashboardData[activeCountry]);
    const now = new Date().toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
    const el = document.getElementById('last-refresh');
    if (el) el.textContent = `Cargado a las ${now}`;
}

init();
</script>
</body>
</html>
