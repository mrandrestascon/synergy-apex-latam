<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynergY Apex - Dashboard LATAM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; border-radius: 10px; margin-bottom: 30px; text-align: center; }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .country-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; background: #1e293b; border: 2px solid #475569; color: #e2e8f0; cursor: pointer; border-radius: 5px; transition: all 0.3s; font-size: 14px; font-weight: 500; }
        .tab-btn.active { background: #667eea; border-color: #667eea; }
        .tab-btn:hover { border-color: #667eea; }
        .content { display: none; }
        .content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: #1e293b; padding: 20px; border-radius: 8px; border-left: 4px solid #667eea; }
        .kpi-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; }
        .kpi-value { font-size: 28px; font-weight: bold; color: #f1f5f9; }
        .kpi-change { font-size: 12px; color: #10b981; margin-top: 8px; }
        .table-container { background: #1e293b; padding: 20px; border-radius: 8px; overflow-x: auto; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0f172a; padding: 12px; text-align: left; font-weight: 600; color: #94a3b8; border-bottom: 1px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        tr:hover { background: #0f172a; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌎 SynergY Apex - Dashboard de Expansión LATAM</h1>
            <p>Inteligencia de datos bancarios en tiempo real</p>
        </header>

        <div class="country-tabs">
            <button class="tab-btn active" onclick="showCountry('Mexico')">🇲🇽 México</button>
            <button class="tab-btn" onclick="showCountry('Chile')">🇨🇱 Chile</button>
            <button class="tab-btn" onclick="showCountry('Panama')">🇵🇦 Panamá</button>
            <button class="tab-btn" onclick="showCountry('CostaRica')">🇨🇷 Costa Rica</button>
        </div>

        <div id="Mexico" class="content active"></div>
        <div id="Chile" class="content"></div>
        <div id="Panama" class="content"></div>
        <div id="CostaRica" class="content"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const supabase = createClient(
            'https://bnpfxaxswmmxzxiggywz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucGZ4YXhzd21teHp4aWdneXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzA4MDcsImV4cCI6MjA5NDQ0NjgwN30.9rlU4sRukMOAuEz_FyPRasRdYmsZNHi4EzNE9JyiT8M'
        );

        const COUNTRY_MAP = {
            Mexico: 'México',
            Chile: 'Chile',
            Panama: 'Panamá',
            CostaRica: 'Costa Rica'
        };

        let dashboardData = {};
        let activeCountry = 'Mexico';

        async function loadData() {
            const [{ data: countries }, { data: actors }] = await Promise.all([
                supabase.from('countries').select('*'),
                supabase.from('actors').select('*')
            ]);

            for (const [tabId, countryName] of Object.entries(COUNTRY_MAP)) {
                const country = countries?.find(c => c.country === countryName);
                if (!country) continue;
                const countryActors = (actors || [])
                    .filter(a => a.country === countryName)
                    .map(a => ({
                        nombre: a.nombre_actor,
                        vista: a.depositos_vista,
                        plazo: a.depositos_plazo,
                        acm: a.acm,
                        cuota: a.cuota_mercado,
                        cagr: a.cagr
                    }));
                dashboardData[tabId] = {
                    pib: country.pib,
                    pib_crecimiento: country.pib_crecimiento,
                    poblacion: country.poblacion,
                    bancarizacion: country.bancarizacion,
                    inflacion: country.inflacion,
                    tasa_bc: country.tasa_bc,
                    fecha: country.fecha_actualizacion,
                    actors: countryActors
                };
            }

            renderDashboard(activeCountry, dashboardData[activeCountry]);
        }

        function fmt(n) {
            if (n == null) return '—';
            return Number(n).toLocaleString('es-MX');
        }

        function renderDashboard(country, d) {
            if (!d) {
                document.getElementById(country).innerHTML = '<p style="color:#94a3b8;padding:20px">Sin datos en Supabase para este país.</p>';
                return;
            }
            const fecha = d.fecha ? new Date(d.fecha).toLocaleDateString('es-MX') : '';
            let html = `
                <div class="grid">
                    <div class="kpi-card"><div class="kpi-label">PIB</div><div class="kpi-value">$${fmt(d.pib)}B</div><div class="kpi-change">+${d.pib_crecimiento}% YoY</div></div>
                    <div class="kpi-card"><div class="kpi-label">Población</div><div class="kpi-value">${fmt(d.poblacion)}</div><div class="kpi-change">Habitantes</div></div>
                    <div class="kpi-card"><div class="kpi-label">Bancarización</div><div class="kpi-value">${d.bancarizacion}%</div><div class="kpi-change">% población</div></div>
                    <div class="kpi-card"><div class="kpi-label">Inflación</div><div class="kpi-value">${d.inflacion}%</div><div class="kpi-change">BC: ${d.tasa_bc}%</div></div>
                </div>
                <div class="table-container">
                    <h2 style="margin-bottom:8px;">Top Actores Bancarios</h2>
                    ${fecha ? `<p style="font-size:11px;color:#64748b;margin-bottom:15px;">Actualizado: ${fecha}</p>` : ''}
                    <table>
                        <thead><tr><th>Banco</th><th>Depósitos Vista</th><th>Depósitos Plazo</th><th>ACM</th><th>Cuota</th><th>CAGR</th></tr></thead>
                        <tbody>
            `;
            d.actors.forEach(a => {
                html += `<tr><td><strong>${a.nombre}</strong></td><td>${fmt(a.vista)}</td><td>${fmt(a.plazo)}</td><td>${fmt(a.acm)}</td><td>${a.cuota}%</td><td>${a.cagr}%</td></tr>`;
            });
            html += `</tbody></table></div>`;
            document.getElementById(country).innerHTML = html;
        }

        window.showCountry = function(country) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(country).classList.add('active');
            event.target.classList.add('active');
            activeCountry = country;
            renderDashboard(country, dashboardData[country]);
        };

        loadData();
    </script>
</body>
</html>
