# ══════════════════════════════════════════════════════════════════════════
# SynerGy Apex LATAM — Master Source Configuration
# Every country, every indicator, every official source.
#
# Source types:
#   api          — HTTP endpoint, structured JSON/XML
#   csv_download — Downloadable CSV file
#   xls_download — Downloadable Excel file
#   web_scrape   — HTML parsing required
#   manual       — No automation possible; value must be entered manually
#
# accessible: true  → pipeline can fetch automatically
# accessible: false → mark as MISSING in output, use last known value
#
# fallback: supabase → on failure, use existing Supabase value
# ══════════════════════════════════════════════════════════════════════════

defaults:
  currency_macro: USD        # All macro values stored in B USD
  currency_deposits: local   # Deposit values in millions of local currency
  cagr_years: 5              # Default CAGR window
  confidence_api: high
  confidence_csv: medium
  confidence_manual: low

# ── MEXICO ─────────────────────────────────────────────────────────────────
México:
  currency: MXN
  dollarised: false
  sources:
    tasa_bc:
      id: banxico_sf61745
      name: "Banxico SIE — Tasa objetivo fondeo bancario a 1 día"
      type: api
      url: "https://www.banxico.org.mx/SieAPIRest/service/v1/series/SF61745/datos/oportuno"
      auth: {header: "Bmx-Token", env: "BANXICO_TOKEN"}
      parser: banxico_serie
      field: tasa_bc
      unit: percent
      accessible: true

    inflacion:
      id: banxico_sp1
      name: "Banxico SIE — INPC variación anual"
      type: api
      url: "https://www.banxico.org.mx/SieAPIRest/service/v1/series/SP1/datos/oportuno"
      auth: {header: "Bmx-Token", env: "BANXICO_TOKEN"}
      parser: banxico_serie
      field: inflacion
      unit: percent
      accessible: true

    pib:
      id: imf_weo_mex
      name: "FMI WEO — PIB México (B USD)"
      type: csv_download
      url: "https://www.imf.org/en/Publications/WEO/weo-database/2024/October/download-entire-database"
      parser: imf_weo
      imf_code: "484"
      field: pib
      unit: billion_usd
      accessible: false   # bulk download; use cached reference value
      fallback: reference
      reference_value: 1347.0
      reference_year: 2024

    pib_crecimiento:
      id: banxico_sf43718_growth
      name: "Banxico / INEGI — Crecimiento PIB real"
      type: api
      url: "https://www.banxico.org.mx/SieAPIRest/service/v1/series/SE38768/datos/oportuno"
      auth: {header: "Bmx-Token", env: "BANXICO_TOKEN"}
      parser: banxico_serie
      field: pib_crecimiento
      unit: percent
      accessible: true

    desempleo:
      id: inegi_enoe
      name: "INEGI ENOE — Tasa de desocupación nacional"
      type: api
      url: "https://www.inegi.org.mx/app/indicadores/api/Indicador/ObtenerIndicador/628194/Mensual/false/false?token={INEGI_TOKEN}"
      auth: {query: "token", env: "INEGI_TOKEN"}
      parser: inegi_indicador
      field: desempleo
      unit: percent
      accessible: false   # requires INEGI token
      fallback: reference
      reference_value: 2.8
      reference_year: 2025

    poblacion:
      id: inegi_pop
      name: "INEGI — Proyecciones de Población"
      type: csv_download
      url: "https://www.inegi.org.mx/app/biblioteca/ficha.html?upc=702825006792"
      parser: inegi_csv
      field: poblacion
      unit: count
      accessible: false
      fallback: reference
      reference_value: 129406736
      reference_year: 2024

    bancarizacion:
      id: global_findex_mex
      name: "Global Findex BM 2021 — % adultos con cuenta"
      type: manual
      accessible: false
      fallback: reference
      reference_value: 56.0
      reference_year: 2021
      notes: "ENIF 2021. Next update: Global Findex 2024 (expected mid-2025)"

    depositos:
      id: cnbv_sf
      name: "CNBV — Serie histórica de captación bancaria"
      type: csv_download
      url: "https://www.cnbv.gob.mx/SECTORES-SUPERVISADOS/BANCA-MULTIPLE/Informacion-Estadistica-BM/Paginas/default.aspx"
      parser: cnbv_captacion
      field: depositos_plazo
      unit: million_mxn
      accessible: false   # requires manual navigation
      fallback: supabase
      notes: "CNBV Boletín Estadístico, hoja Captación"

